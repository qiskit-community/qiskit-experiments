---
upgrade:
  - |
    Deserializing JSON with the :class:`.ExperimentDecoder` class now only
    supports loading custom classes outside of Qiskit Experiments that register
    with the ``qiskit_experiments.deserialization_packages`` entry point and
    implement a ``__json_decode__`` class method. Deserializing functions and
    class methods is no longer supported. See the :class:`.ExperimentEncoder`
    documentation for more details.
  - |
    Serializing objects with a ``settings`` property is no longer supported by
    :class:`.ExperimentEncoder` (outside of special cases of class in Qiskit).
    Objects must implement a ``__json_encode__`` method. See the
    :class:`.ExperimentEncoder` documentation for more details.
  - |
    The ``__json_encode__`` method of :class:`.FigureData` was updated to
    convert its figures into SVG format. Previously, figures could be left as
    matplotlib figure objects which could then be serialized with
    :class:`.ExperimentEncoder` as empty containers with no figure data.
  - |
    :class:`.LayerFidelity` was updated so that its input validation is
    compatible with round trip JSON serialization with
    :class:`.ExperimentEncoder` and :class:`.ExperimentDecoder`. The basis
    gates can either be passed as ``__init__`` arguments or set as experiment
    options (which can be inferred from the backend). The experiment code
    saves both ``__init__`` arguments and experiment options and includes them
    the serialized JSON payload. Before this release, the experiment
    ``__init__`` had been validating basis gates passed as arguments. During
    deserialization this validation would happen before the experiment options
    were restored, raising an exception when the gates had been set as
    experiment options after being found in the target of a backend passed in
    as a target. Gate validation has been delayed until a backend is set so
    that setting the gates after ``__init__`` is now allowed.

    Additionally, check that the ``two_qubit_gate`` option is in the backend
    target or in the standard Qiskit gate name mapping was delayed from the
    experiment ``__init__`` until first use in the ``circuits()`` method for
    similar reasons.
security:
  - |
    The :class:`.ExperimentDecoder` class used to load :class:`.ExperimentData`
    objects saved to an experiment service (or to save Qiskit Experiments
    objects serialized to JSON more generally) has been overhauled to improve
    security. Deserializing objects outside of the core types handled by Qiskit
    Experiments (such as numpy arrays, complex numbers, Qiskit ``quantum_info``
    classes, etc.) now requires that the object's class belong to a package
    registered with the ``qiskit_experiments.deserialization_packages`` entry
    point and that the class implement a ``__json_decode__`` method.
    Additionally, deserializing functions and class methods is no longer
    supported. Prior to these changes, in Qiskit Experiments 0.13 and earlier,
    it was possible to trigger the execution of arbitrary code with a custom
    JSON payload (with "custom" here meaning not a payload generated by Qiskit
    Experiments itself). With all versions of Qiskit Experiments, including
    0.14, it is strongly recommended not to deserialize an untrusted payload.
    See the :class:`.ExperimentEncoder` documentation for more details.
