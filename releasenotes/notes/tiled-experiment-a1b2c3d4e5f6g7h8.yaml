---
features:
  - |
    Added :class:`~.TiledExperiment` composite experiment for efficiently running
    the same experiment across multiple groups of qubits on a device. This class
    transpiles a template experiment once and then remaps the transpiled circuits
    to different physical qubits without re-transpiling, significantly improving
    performance for large-scale characterization tasks.

    .. warning::
        This approach prioritizes speed over correctness by remapping circuits
        without re-transpiling. Users should verify results when using
        backend-specific features or connectivity constraints.
